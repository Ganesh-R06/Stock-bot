name: Run Stock Alert

on:
  schedule:
    # 7:00 AM IST is 1:30 AM UTC. This runs Monday through Friday.
    - cron: '30 1 * * 1-5' 
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests twilio

      - name: Run Python Script
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          STOCK_API_KEY: ${{ secrets.STOCK_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # Remember to include your phone secrets here as well:
          TWILIO_PHONE: ${{ secrets.TWILIO_PHONE }}
          MY_PHONE: ${{ secrets.MY_PHONE }}
        run: python main.py
